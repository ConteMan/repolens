version: 2

project_name: repolens

builds:
  - id: repolens
    main: ./cmd/repolens
    binary: repolens
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/ConteMan/repolens/internal/cli.Version={{.Version}}

archives:
  - id: archive
    ids:
      - repolens
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: checksums.txt

# Release notes 由 workflow 从 CHANGELOG.md 抽取（--release-notes），
# 不用 git log 自动生成。
changelog:
  disable: true

release:
  github:
    owner: ConteMan
    name: repolens
  name_template: "{{ .Tag }}"
  # rc/beta 等预发布 tag 自动标记 prerelease，避免被 /releases/latest
  # 返回给 repolens upgrade 的普通用户。
  prerelease: auto

# GoReleaser 2.10+ 弃用 brews，CLI 二进制走 homebrew_casks。
homebrew_casks:
  - name: repolens
    ids:
      - archive
    repository:
      owner: ConteMan
      name: homebrew-tap
      token: "{{ .Env.GH_PAT }}"
    homepage: https://github.com/ConteMan/repolens
    description: Turn any Git repository into a browsable static site
    license: MIT
    # 二进制未做 Apple 签名/公证：cask 安装会带 com.apple.quarantine，
    # Apple Silicon 上 Gatekeeper 直接 SIGKILL（v1.0.1-rc.1 实测）。
    # GoReleaser 官方 workaround：装后钩子去隔离属性。
    # 正式签名+公证需 Apple Developer 账号，后置（见 spec 009 边界）。
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/repolens"]
          end

# Scoop bucket 寄宿在 homebrew-tap 仓的 bucket/ 目录（单卫星仓，2026-07-07 确认）。
scoops:
  - name: repolens
    ids:
      - archive
    repository:
      owner: ConteMan
      name: homebrew-tap
      token: "{{ .Env.GH_PAT }}"
    directory: bucket
    homepage: https://github.com/ConteMan/repolens
    description: Turn any Git repository into a browsable static site
    license: MIT
