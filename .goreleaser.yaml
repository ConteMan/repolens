version: 2

project_name: repolens

builds:
  - id: repolens
    main: ./cmd/repolens
    binary: repolens
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/ConteMan/repolens/internal/cli.Version={{.Version}}

archives:
  - id: archive
    ids:
      - repolens
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: checksums.txt

# Release notes 由 workflow 从 CHANGELOG.md 抽取（--release-notes），
# 不用 git log 自动生成。
changelog:
  disable: true

release:
  github:
    owner: ConteMan
    name: repolens
  name_template: "{{ .Tag }}"

# GoReleaser 2.10+ 弃用 brews，CLI 二进制走 homebrew_casks。
homebrew_casks:
  - name: repolens
    ids:
      - archive
    repository:
      owner: ConteMan
      name: homebrew-tap
      token: "{{ .Env.GH_PAT }}"
    homepage: https://github.com/ConteMan/repolens
    description: Turn any Git repository into a browsable static site
    license: MIT

scoops:
  - name: repolens
    ids:
      - archive
    repository:
      owner: ConteMan
      name: scoop-bucket
      token: "{{ .Env.GH_PAT }}"
    homepage: https://github.com/ConteMan/repolens
    description: Turn any Git repository into a browsable static site
    license: MIT
