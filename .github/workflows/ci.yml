name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # dogfood 构建需要 git 历史取最后修改元数据

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: internal/ui/frontend/pnpm-lock.yaml

      - name: frontend install
        working-directory: internal/ui/frontend
        run: pnpm install --frozen-lockfile

      - name: frontend checks and build
        working-directory: internal/ui/frontend
        run: pnpm check

      - name: embedded frontend is current
        run: test -z "$(git status --porcelain -- internal/ui/dist)"

      - name: install browser for UI smoke test
        working-directory: internal/ui/frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: UI browser smoke test
        working-directory: internal/ui/frontend
        run: pnpm test:e2e

      - name: go mod tidy check
        run: go mod tidy -diff

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt needs to be run on:" && echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race ./...

      - name: dogfood build
        run: |
          go run ./cmd/repolens build . -o /tmp/dogfood-dist
          test -f /tmp/dogfood-dist/view/index.html
          test -f /tmp/dogfood-dist/llms.txt
          test -f /tmp/dogfood-dist/index.json
